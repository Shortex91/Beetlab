<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BeetLab</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #e8f5e9, #ffffff);
      text-align: center;
    }
    .hero {
      padding: 100px 20px;
    }
    h1 {
      font-size: 48px;
      margin-bottom: 20px;
    }
    p {
      font-size: 20px;
      color: #555;
      max-width: 600px;
      margin: 0 auto 30px;
    }
    button {
      padding: 15px 30px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin: 10px;
    }
    .primary {
      background-color: #2e7d32;
      color: white;
    }
    .secondary {
      background-color: white;
      border: 2px solid #2e7d32;
      color: #2e7d32;
    }
  </style>
</head>
<body>
  <div class="hero">
    <h1>🌱 BeetLab</h1>
    <p>Der intelligente Weg zu deinem perfekten Beet.</p>
    <button class="primary">Jetzt starten</button>
    <button class="secondary">Mehr erfahren</button>
  </div>
</body>
</html>
