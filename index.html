<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BeetLab</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #1c2b22, #0d1510);
      color: white;
      text-align: center;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 40px 20px;
    }

    h1 {
      font-size: 64px;
      line-height: 1.1;
      margin-bottom: 20px;
    }

    .green {
      color: #4fc860;
    }

    p {
      font-size: 20px;
      color: #aab5ad;
      max-width: 700px;
      margin: auto;
    }

    .buttons {
      margin-top: 30px;
    }

    .btn {
      padding: 14px 24px;
      border-radius: 12px;
      margin: 5px;
      display: inline-block;
      text-decoration: none;
      font-weight: bold;
    }

    .primary {
      background: #3fa34d;
      color: black;
    }

    .secondary {
      border: 1px solid #3fa34d;
      color: #3fa34d;
    }

    /* VIDEO SECTION */

    .animation-row {
      margin-top: 50px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .anim-card {
      border-radius: 24px;
      overflow: hidden;
      position: relative;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .anim-card:hover {
      transform: translateY(-6px) scale(1.02);
      box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    }

    .anim-card video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .anim-card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.3), transparent 50%);
    }

    @media (max-width: 900px) {
      .animation-row {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 42px;
      }
    }

  </style>
</head>

<body>

  <div class="container">

    <h1>
      Der intelligente Weg<br>
      zu deinem <span class="green">perfekten Beet.</span>
    </h1>

    <p>
      Plane dein Beet smarter, kombiniere Pflanzen sinnvoll und nutze deine Fläche optimal.
      BeetLab verbindet Gartenwissen mit moderner Struktur und intelligenter Unterstützung.
    </p>

    <div class="buttons">
      <a href="#" class="btn primary">Jetzt starten</a>
      <a href="#" class="btn secondary">Mehr erfahren</a>
    </div>

    <!-- 🎬 VIDEO ANIMATIONEN -->
    <div class="animation-row">

      <div class="anim-card">
        <video autoplay muted loop playsinline>
          <source src="corn.mp4" type="video/mp4">
        </video>
      </div>

      <div class="anim-card">
        <video autoplay muted loop playsinline>
          <source src="pumpkin.mp4" type="video/mp4">
        </video>
      </div>

      <div class="anim-card">
        <video autoplay muted loop playsinline>
          <source src="bad-neighbors.mp4" type="video/mp4">
        </video>
      </div>

    </div>

  </div>

</body>
</html>
