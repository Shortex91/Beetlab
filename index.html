<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BeetLab</title>

  <!-- Script Font für "Beet." -->
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

  <style>
    :root {
      --green: #57d465;
      --green-dark: #43b851;
      --text: #eef5f0;
      --muted: #c2cdc6;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(87,212,101,0.10), transparent 24%),
        linear-gradient(90deg, #08130d 0%, #0d2218 50%, #08130d 100%);
    }

    .container {
      width: min(1200px, calc(100% - 40px));
      margin: 0 auto;
    }

    /* HEADER */
    .header {
      padding: 20px 0;
    }

    .header-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .brand img {
      height: 55px;
    }

    .nav a {
      margin-left: 20px;
      text-decoration: underline;
    }

    /* HERO */
    .hero {
      text-align: center;
      padding: 40px 0;
    }

    .hero h1 {
      font-size: clamp(50px, 7vw, 90px);
      line-height: 1;
      margin: 20px auto;
      max-width: 1000px;
    }

    .beet-script {
      font-family: 'Pacifico', cursive;
      margin-left: 10px;
      display: inline-block;
      transform: rotate(-2deg);
    }

    .hero p {
      max-width: 800px;
      margin: 20px auto;
      font-size: 20px;
      color: var(--muted);
    }

    .buttons {
      margin-top: 30px;
    }

    .btn {
      padding: 14px 28px;
      border-radius: 12px;
      font-weight: bold;
      margin: 0 10px;
      display: inline-block;
    }

    .btn-primary {
      background: linear-gradient(var(--green), var(--green-dark));
      color: black;
    }

    .btn-secondary {
      border: 1px solid var(--green);
      color: var(--green);
    }

    /* IMAGES */
    .cards {
      margin-top: 50px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .card img {
      width: 100%;
      border-radius: 20px;
    }

    /* FOOT */
    .section {
      margin-top: 60px;
      text-align: center;
    }

  </style>
</head>

<body>

  <!-- HEADER -->
  <div class="header container">
    <div class="header-inner">

      <!-- LOGO -->
      <div class="brand">
        <img src="Beet.Lab Logo.png" alt="BeetLab Logo">
      </div>

      <!-- NAV -->
      <div class="nav">
        <a href="#">Entdecken</a>
        <a href="#">Start</a>
      </div>

    </div>
  </div>

  <!-- HERO -->
  <div class="hero container">

    <h1>
      Der intelligente Weg<br>
      zu deinem perfekten
      <span class="beet-script">Beet.</span>
    </h1>

    <p>
      Plane dein Beet smarter, kombiniere Pflanzen sinnvoll und nutze deine Fläche optimal.
      BeetLab verbindet Gartenwissen mit moderner Struktur und intelligenter Unterstützung.
    </p>

    <div class="buttons">
      <a href="#" class="btn btn-primary">Jetzt starten</a>
      <a href="#" class="btn btn-secondary">Mehr erfahren</a>
    </div>

    <!-- BILDER -->
    <div class="cards">
      <div class="card">
        <img src="image1.png">
      </div>
      <div class="card">
        <img src="image2.png">
      </div>
      <div class="card">
        <img src="image3.png">
      </div>
    </div>

  </div>

  <!-- SECTION -->
  <div class="section container">
    <h2>Warum BeetLab?</h2>
  </div>

</body>
</html>
